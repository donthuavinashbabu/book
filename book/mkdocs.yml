site_name: Book Knowledge Base
site_description: Searchable static documentation generated from repository content.
site_url: ""
repo_name: avina/book
docs_dir: site-src
site_dir: site
use_directory_urls: false

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
